version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: math-monopoly-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mathmonopoly
      POSTGRES_PASSWORD: mathmonopoly_dev
      POSTGRES_DB: math_monopoly
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
